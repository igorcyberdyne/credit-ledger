services:
  php:
    build:
      context: ./
      target: php
      args:
        APP_ENV: ${APP_ENV:-dev}
    networks: [ credit_ledger ]
    depends_on: [ database ]
    volumes:
      # MacOS: utilise delegated pour accélérer le montage
      - .:/var/www/html:cached,delegated
    ports:
      - "9000:9000"
    environment:
      APP_ENV: ${APP_ENV:-dev}

  nginx:
    build:
      context: .
      target: ${APP_ENV:-dev} # Stage dev ou prod
      args:
        APP_ENV: ${APP_ENV:-dev}
    networks: [ credit_ledger ]
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached,delegated
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: mariadb:10.9.5
    networks: [ credit_ledger ]
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    volumes:
      - database:/var/lib/mysql

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached,delegated
    networks: [ credit_ledger ]
    tty: true
    command: sh -c "npm install && npm run dev"

volumes:
  database:

networks:
    credit_ledger:
    driver: null
